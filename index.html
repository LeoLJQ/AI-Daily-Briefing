<head>

<title>AI 行业日报</title>
<style>
  :root {
    --bg: #f7f6f3;
    --sidebar-bg: #111827;
    --sidebar-text: #9ca3af;
    --sidebar-active: #ffffff;
    --sidebar-hover: #1f2937;
    --card-bg: #ffffff;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 10px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── Sidebar ── */
  nav {
    width: 240px; min-width: 240px;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    overflow-y: auto;
  }
  .nav-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-header h1 { color: #fff; font-size: 16px; font-weight: 700; }
  .nav-header .subtitle { font-size: 11px; color: var(--sidebar-text); margin-top: 2px; }
  .nav-list { flex: 1; padding: 6px 0; list-style: none; }
  .nav-list li a {
    display: block; padding: 9px 20px; color: var(--sidebar-text);
    text-decoration: none; font-size: 13px;
    transition: all var(--transition);
    border-left: 3px solid transparent; cursor: pointer;
  }
  .nav-list li a:hover { background: var(--sidebar-hover); color: #ddd; }
  .nav-list li a.active {
    color: var(--sidebar-active);
    background: rgba(37, 99, 235, 0.18);
    border-left-color: var(--accent); font-weight: 600;
  }
  .nav-list li a .date-badge {
    display: inline-block; background: rgba(255,255,255,0.08);
    border-radius: 4px; padding: 1px 6px; font-size: 11px; margin-right: 6px;
  }
  .nav-footer {
    padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11px; color: #555;
  }

  /* ── Floating ToC ── */
  .toc {
    position: fixed; top: 32px; right: 24px; z-index: 90;
    width: 180px; font-size: 12px; opacity: 0; transform: translateX(10px);
    transition: opacity var(--transition), transform var(--transition);
    pointer-events: none;
  }
  .toc.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .toc-title { font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .toc a {
    display: block; padding: 3px 0; color: var(--text-secondary);
    text-decoration: none; border-left: 2px solid transparent;
    padding-left: 8px; transition: all var(--transition);
  }
  .toc a:hover, .toc a.active { color: var(--accent); border-left-color: var(--accent); }

  /* ── Main ── */
  main {
    margin-left: 240px; flex: 1; padding: 28px 40px;
    display: flex; justify-content: center; min-height: 100vh;
  }
  .briefing {
    background: transparent;
    width: 100%; max-width: 840px;
  }

  /* ── Header card ── */
  .briefing h1 {
    font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
    background: var(--card-bg); border-radius: var(--radius);
    padding: 24px 32px; box-shadow: var(--shadow); margin-bottom: 20px;
  }

  /* ── Section accordions ── */
  .section {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 14px;
    overflow: hidden; transition: box-shadow var(--transition);
  }
  .section:hover { box-shadow: var(--shadow-hover); }

  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 24px; cursor: pointer; user-select: none;
    transition: background var(--transition);
    border-bottom: 1px solid transparent;
  }
  .section-header:hover { background: #fafbfc; }
  .section.open .section-header { border-bottom-color: var(--border); }

  .section-header h2, .section-header h3 {
    flex: 1; font-size: 15px; font-weight: 700; margin: 0; padding: 0; border: none;
    color: var(--text);
  }
  .section-arrow {
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition); font-size: 10px; color: var(--text-secondary);
  }
  .section.open .section-arrow { transform: rotate(90deg); }

  .section-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s;
  }
  .section.open .section-body {
    max-height: 20000px; padding: 16px 24px 20px;
  }

  /* ── Article cards (inside curated) ── */
  .article-card {
    display: flex; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .article-card:last-child { border-bottom: none; }
  .article-card .card-img {
    width: 80px; height: 56px; border-radius: 6px;
    object-fit: cover; flex-shrink: 0; background: #f3f4f6;
  }
  .article-card .card-body { flex: 1; min-width: 0; }
  .article-card .card-body strong { display: block; margin-bottom: 2px; font-size: 14px; }
  .article-card .card-body p { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0; }

  /* ── Standard list items style ── */
  .section-body li { margin-bottom: 10px; font-size: 14px; line-height: 1.75; }
  .section-body li strong { color: var(--text); }
  .section-body a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .section-body a:hover { text-decoration: underline; }

  .section-body p { margin-bottom: 10px; font-size: 14px; }
  .section-body h2 { font-size: 16px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .section-body h3 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: #444; }

  blockquote {
    margin: 12px 0; padding: 10px 16px;
    background: #f9fafb; border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0; font-size: 13px; color: #666;
  }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  th { background: #f9fafb; padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  /* ── Floating image preview ── */
  .img-preview {
    position: fixed; bottom: 20px; right: 220px; z-index: 200;
    max-width: 320px; max-height: 220px; border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2); display: none;
    object-fit: cover; pointer-events: none;
  }

  /* ── Responsive ── */
  @media (max-width: 1200px) { .toc { display: none; } }
  @media (max-width: 768px) {
    nav { width: 100%; min-width: unset; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; }
    .nav-list { display: flex; overflow-x: auto; }
    .nav-list li a { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; padding: 8px 14px; }
    main { margin-left: 0; padding: 14px; }
    .section-header { padding: 12px 16px; }
    .section.open .section-body { padding: 12px 16px; }
    .article-card { flex-direction: column; }
    .article-card .card-img { width: 100%; height: 120px; }
  }
</style>
</head>

<script>
const BRIEFINGS = {"2026-06-24": "<h1>AI 行业日报 — 2026-06-24</h1>\n\n\n<h2 id=\"科研学术\">🔬 科研学术</h2>\n\n<h3 id=\"国际\">国际</h3>\n\n<ul>\n<li><strong><a href=\"https://www.qbitai.com/2026/06/437734.html\" target=\"_blank\" rel=\"noopener\">Claude Code 大升级，Karpathy 称其为 LLM 第三次变革</a></strong>（量子位，6月24日）— Anthropic 发布 Claude Code 重大更新，Karpathy 评价这是继 ChatGPT 对话界面、Codex 代码生成之后的第三次 LLM UI/UX 范式变革。<a href=\"https://www.qbitai.com/2026/06/437734.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong><a href=\"https://www.qbitai.com/2026/06/437833.html\" target=\"_blank\" rel=\"noopener\">港大 MaRS Lab 拿下 IEEE TRO 傅京孙纪念最佳论文奖</a></strong>（量子位，6月24日）— 华为天才少年一作，机器人领域顶级期刊 IEEE TRO 最高荣誉。<a href=\"https://www.qbitai.com/2026/06/437833.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>Anthropic Mythos 模型数小时内发现美国政府系统安全漏洞</strong>（美联社，6月24日）— 代号「Project Glasswing」的机密测试中，Mythos 仅用数小时即突破几乎所有涉密系统。参议员 Warner 在国会听证会上披露了这一结果。此事正值 Anthropic 与美国政府在模型出口管制问题上关系紧张之际。<a href=\"https://www.yna.co.kr/view/AKR20260624075100091\" target=\"_blank\" rel=\"noopener\">[韩联社</a>]</li>\n<li><strong>Nature 发布大规模研究：AI 辅助科研发 3 倍论文、引 5 倍引用，但降低 22% 合作</strong>（Nature，2026年6月刊）— 分析 4100 万篇自然科学论文发现，AI 辅助研究者产出更高，但伴随主题多样性下降 5% 和合作减少，引发\"科学单一文化\"担忧。同期 Nature Machine Intelligence 刊发数学家《莱顿宣言》，警告 AI 过度使用可能削弱数学研究的透明性和严谨验证。<a href=\"https://www.nature.com/articles/d41586-026-01954-2\" target=\"_blank\" rel=\"noopener\">[Nature</a>]</li>\n<li><strong>Nature 调查：科学家患\"AI FOMO\"</strong>（Nature，6月）— 1900 名研究者中 48% 对 AI 持负面态度，63% 认为 AI 风险大于收益，但约 60% 害怕不采用 AI 会被淘汰。仅 23% 认为 AI 对研究有正面影响。<a href=\"https://www.nature.com/articles/d41586-026-01690-7\" target=\"_blank\" rel=\"noopener\">[Nature</a>]</li>\n</ul>\n<h3 id=\"国内\">国内</h3>\n\n<ul>\n<li><strong><a href=\"https://www.x-techcon.com/article/153891.html\" target=\"_blank\" rel=\"noopener\">机器之心 × 茶思屋直播：Recursive Self-Improvement——当 AI 开始进化 AI</a></strong>（机器之心，6月24日 19:00）— 北大仉尚航、上交温颖、清华王立元、KAUST 诸葛鸣晨四位嘉宾，讨论 AI 递归自我改进的技术路线与未来图景。<a href=\"https://www.x-techcon.com/article/153891.html\" target=\"_blank\" rel=\"noopener\">[x-techcon</a>]</li>\n</ul>\n\n<h2 id=\"产品应用\">🚀 产品应用</h2>\n\n<h3 id=\"国际\">国际</h3>\n\n<ul>\n<li><strong>Claude Code 大升级，Karpathy 称为\"LLM UIUX 第三次重大设计\"</strong>（6月24日）— Anthropic 同时将 Claude Cowork 能力推向手机端，支持后台执行，关掉 App 后任务继续跑。与 OpenAI 的\"人在回路审批\"策略形成差异化。<a href=\"https://www.qbitai.com/2026/06/437734.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>马斯克官宣 Starmind：太空 AI 算力项目</strong>（6月24日）— SpaceX 规划发射最多 100 万颗计算卫星构建轨道 AI 数据中心，首代 AI1 卫星单颗提供 120kW 算力，通过光链路连接 Starlink 回传地面。<a href=\"https://www.toutiao.com/article/7654852109905281578/\" target=\"_blank\" rel=\"noopener\">[今日头条</a>]</li>\n<li><strong>Oracle 裁员 2.1 万人，腾出资金投入 AI 数据中心</strong>（6月24日）— 将人力成本节省和新增债务全部转向 AI 基础设施投资，反映传统企业软件公司在 AI 时代的转型阵痛。</li>\n</ul>\n<h3 id=\"国内\">国内</h3>\n\n<ul>\n<li><strong>阿里 QoderWork 推\"峰谷 Token\"</strong>（6月24日）— 夜间使用 Qwen3.7 编码模型低至 2 折，用定价杠杆引导开发者错峰使用算力。<a href=\"https://www.qbitai.com/2026/06/437834.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>周鸿祎宣布打造中国版 Mythos</strong>（6月24日）— 360 联手信创巨头发起\"磐石之盾\"安全协作计划，ISC 2026 上宣布，定位为国家级 AI 安全基础设施。<a href=\"https://www.qbitai.com/2026/06/437838.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>智能座舱之王「转身」物理 AI，高通需要被重估了</strong>（量子位，6月24日）— 深度分析高通从汽车座舱芯片向物理 AI 平台转型的战略逻辑。<a href=\"https://www.qbitai.com/2026/06/432494.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>WAIC 2026 SAIL 奖 TOP30 及青年优秀论文奖 TOP20 发布</strong>（6月24日）— 世界人工智能大会最高荣誉入围名单公布。<a href=\"https://www.qbitai.com/2026/06/437698.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong>火山引擎 Force 大会：豆包 2.1 Pro 上线，Seedance 2.0 升 4K</strong>（硅星人，6月24日报道）— 豆包大模型日均 Token 调用突破 180 万亿（年增 10 倍），火山引擎以 49.5% 份额居中国 MaaS 市场第一。同时发布 Seedance 2.0 4K（电影工业级）、Seedance 2.5（30 秒原生视频直出），豆包专业版同日上线（68-500 元/月）。<a href=\"https://www.163.com/dy/article/L06AGMBQ0511N33R.html\" target=\"_blank\" rel=\"noopener\">[163.com</a>]</li>\n<li><strong>智元机器人 6 天直播：精灵 G2 独立承接产线质检，成功率超 99.5%</strong>（6月24日）— 多台人形机器人在龙旗科技南昌工厂集群上岗，8 小时综合成功率超 99.5%，单台节拍 18-20 秒。背后是 GenieSim 3.0 数字孪生 + GO-2 具身基础模型。被视为人形机器人从实验室走向量产的关键节点。<a href=\"http://stock.10jqka.com.cn/20260624/c677670502.shtml\" target=\"_blank\" rel=\"noopener\">[同花顺</a>]</li>\n<li><strong>MWC26 上海开幕：聚焦 6G、移动 AI、具身智能</strong>（6月24日）— 稚晖君担任主旨演讲嘉宾，现场设人形机器人点球大赛。<a href=\"http://www.cww.net.cn/article?id=FC938831D65845F5A56D89F164815AB6\" target=\"_blank\" rel=\"noopener\">[通信世界</a>]</li>\n</ul>\n\n<h2 id=\"融资进展\">💰 融资进展</h2>\n\n<h3 id=\"国际\">国际</h3>\n\n<ul>\n<li><strong>Menlo Ventures 募资 $30 亿创纪录基金</strong>（6月23日宣布，6月24日广泛报道）— Anthropic 股份价值约 $140 亿，新基金将投向 AI 基础设施和 AI 原生企业。<a href=\"https://www.techinasia.com/news/menlo-ventures-raises-record-3b-fund\" target=\"_blank\" rel=\"noopener\">[Tech in Asia</a>]</li>\n<li><strong>字节跳动寻求 $200 亿离岸贷款</strong>（6月24日）— 史上最大规模离岸贷款，用于 AI 基础设施和数据中心建设。2026 年资本开支或达 $700 亿，2027 年可能 $1000 亿。<a href=\"https://finance.yahoo.com/technology/articles/bytedance-seeks-20-billion-053256781.html\" target=\"_blank\" rel=\"noopener\">[Yahoo Finance</a>]</li>\n</ul>\n<h3 id=\"国内\">国内</h3>\n\n<ul>\n<li><strong>逆矩阵科技完成超亿美元种子++轮融资</strong>（6月24日）— 22 岁北大准毕业生创立，通用世界基座模型方向，提出\"世界基座模型之于物理 AI 正如大语言模型之于信息 AI\"。<a href=\"https://kw.beijing.gov.cn/xwdt/kcyx/xwdtyqqy/202606/t20260624_4712946.html\" target=\"_blank\" rel=\"noopener\">[北京科委</a>]</li>\n<li><strong>清研精准完成数亿元 B3 轮融资</strong>（6月24日）— 清华系，目标打造物理 AI 数据基础设施。<a href=\"https://www.leiphone.com/category/industrynews/ATSs1siQdN2RCpgn.html\" target=\"_blank\" rel=\"noopener\">[雷锋网</a>]</li>\n<li><strong>知跃空间智能完成数亿元天使 5+ 轮融资</strong>（6月24日）— 类脑智能/精细树突计算方向，锚定 Physical AI 底层基建。<a href=\"https://www.pedaily.cn/first/161632.shtml\" target=\"_blank\" rel=\"noopener\">[投资界</a>]</li>\n<li><strong>智谱考虑在香港配股融资数十亿美元</strong>（6月24日）— 自 1 月上市以来股价已飙升 2000%，市值破万亿后继续募资。<a href=\"https://wap.stockstar.com/detail/IG2026062400020210\" target=\"_blank\" rel=\"noopener\">[证券之星</a>]</li>\n</ul>\n\n<h2 id=\"市场动态\">📊 市场动态</h2>\n\n<ul>\ — or a Diffuse Monoculture?</a></strong>（Nature，6月刊）— 基于 4100 万篇论文的大规模研究揭示：AI 提升个人产出却削弱合作与多样性，科学界面临\"工业化研究\"的结构性风险。</li>\n</ul>\n<h3 id=\"中文公众号网站\">中文公众号/网站</h3>\n\n<ul>\n<li><strong><a href=\"https://www.qbitai.com/2026/06/437853.html\" target=\"_blank\" rel=\"noopener\">物理 AI 第一块万亿市场，在公路货运先跑通闭环了</a></strong>（量子位，6月24日）— 深度报道物理 AI 在公路货运场景的实际落地进展，从技术可行到商业闭环的完整路径。<a href=\"https://www.qbitai.com/2026/06/437853.html\" target=\"_blank\" rel=\"noopener\">[量子位</a>]</li>\n<li><strong><a href=\"https://36kr.com/p/3865697138283521\" target=\"_blank\" rel=\"noopener\">实测「微信小微」：当腾讯开始兑现国民 App 的 AI 潜能</a></strong>（极客公园，6月24日36氪发布）— 对微信原生 AI 助手小微的全场景深度实测，评价为\"不激进但挺有用\"的 AI 中间层。<a href=\"https://36kr.com/p/3865697138283521\" target=\"_blank\" rel=\"noopener\">[36氪</a>]</li>\n<li><strong><a href=\"https://www.163.com/dy/article/L06AGMBQ0511N33R.html\" target=\"_blank\" rel=\"noopener\">火山引擎就是要制造一个一个又一个 Seedance 2.0 时刻</a></strong>（硅星人，6月24日）— 豆包日均 Token 调用 180 万亿、MaaS 市场第一、Seedance 2.5 直出 30 秒视频，字节的 AI 路径从「全能选手」转向「场景深耕」。<a href=\"https://www.163.com/dy/article/L06AGMBQ0511N33R.html\" target=\"_blank\" rel=\"noopener\">[163.com</a>]</li>\n<li><strong><a href=\"https://w.geekpark.net/news/366377\" target=\"_blank\" rel=\"noopener\">「链企」英伟达</a></strong>（极客公园，6月24日）— 链博会上英伟达展示从芯片到应用的五层 AI 生态，RTX Spark PC 芯片标志英伟达正式进军 PC 处理器市场。<a href=\"https://w.geekpark.net/news/366377\" target=\"_blank\" rel=\"noopener\">[极客公园</a>]</li>\n<li><strong>新智元、DeepTech深科技、Z Finance、特工宇宙、elsewhere 今日文章待晚间 v3 终版补充。</strong></li>\n</ul>\n\n<h2 id=\"今日重点\">📌 今日重点</h2>\n\n<h3 id=\"1-claude-code-大升级-karpathy-背书ai-交互范式的第三次\">1. Claude Code 大升级 + Karpathy 背书——AI 交互范式的第三次变革</h3>\n\n<p>Anthropic 在 6 月 24 日发布的 Claude Code 更新被 Karpathy 称为继 ChatGPT 和 Codex 之后的\"第三次 LLM UI/UX 重大设计\"。同一天，Claude Cowork 推向手机端，支持后台执行。这意味着 AI 从\"人在回路中盯着看\"走向\"人在回路外信任 AI 自己干活\"。Anthropic 和 OpenAI 在 Agent 路线上正式分道——前者追求自主，后者强调可控。</p>\n\n<h3 id=\"2-ai-股抛售潮延续市场在重新定价ai-叙事\">2. AI 股抛售潮延续——市场在重新定价\"AI 叙事\"</h3>\n\n<p>纳指连跌，费城半导体指数从高点回落，美光单日跌 13%。摩根大通报告和白宫前经济顾问同日发声：AI 投资逻辑正从\"不计成本\"转向\"要看到回报\"。云巨头 $7250 亿年度资本开支的 ROI 成为市场核心疑虑。但这轮调整的健康之处在于：它正在把资金从\"讲故事的\"挤向\"真赚钱的\"。</p>\n\n<h3 id=\"3-物理-ai-融资潮持续一周内-5-笔大额融资\">3. 物理 AI 融资潮持续——一周内 5 笔大额融资</h3>\n\n<p>逆矩阵（超亿美元）、清研精准（数亿元）、知跃空间（数亿元）、光轮智能（10 亿元）、正行创新（近亿美元）——从世界模型到数据基础设施到类脑计算，物理 AI 赛道在一周内吸引了超过 30 亿人民币的早期融资。22 岁北大毕业生拿到超亿美元种子++轮，硅谷式的年轻创始人叙事正在中国 AI 圈复制。</p>\n\n<h3 id=\"4-anthropic-与政府关系持续恶化ai-安全与主权的全球博弈升级\">4. Anthropic 与政府关系持续恶化——AI 安全与主权的全球博弈升级</h3>\n\n<p>同一天两条新闻：Mythos 模型在数小时内发现美国政府涉密系统漏洞，五眼联盟发布紧急声明称下一轮 AI 突破迫在眉睫。Anthropic 同时被列入国安黑名单（拒绝军方用于国内监控），又被政府施加模型出口管制。这不再是单家公司与单一政府的摩擦——它标志着「AI 能力」和「AI 治理」两个向量正式脱钩：最强的模型不一定是政府可用的模型。</p>\n\n\n<blockquote>\n<p>v1 10:00 | v2 15:00 | 下一版 22:00</p>\n</blockquote>\n", "2026-06-23": "<h1>AI 行业日报 — 2026-06-23</h1>\n\n\n<h2 id=\"科研学术\">🔬 科研学术</h2>\n\n<h3 id=\"国际\">国际</h3>\n\n<ul>\n<li><strong><a href=\"https://www.eurekalert.org/news-releases/1132795\" target=\"_blank\" rel=\"noopener\">TRUECAM：AI 诊断会说\"我不知道\"</a></strong>（Nature Biomedical Engineering, 6月23日）— 不确定性感知的病理 AI，对超出训练范围的输入主动拒绝判断而非强行输出错误结果，在非小细胞肺癌分型中提升了跨性别和种族的公平性。<a href=\"https://www.eurekalert.org/news-releases/1132795\" target=\"_blank\" rel=\"noopener\">[EurekAlert</a>]</li>\n<li><strong><a href=\"https://www.webpronews.com/small-models-big-reasoning-how-vibethinker-3b-challenges-the-scale-first-orthodoxy/\" target=\"_blank\" rel=\"noopener\">VibeThinker-3B：3B 参数小模型在数学推理上超越 200 倍大模型</a></strong>（6月23日报道）— AIME 2026 得分 94.3，超 Gemini 3 Pro（91.7）；LiveCodeBench v6 Pass@1 达 80.2；后训练成本仅约 $7800。核心命题：\"可验证推理可压缩进小模型，知识则需要参数覆盖\"。<a href=\"https://www.webpronews.com/small-models-big-reasoning-how-vibethinker-3b-challenges-the-scale-first-orthodoxy/\" target=\"_blank\" rel=\"noopener\">[WebProNews</a>]</li>\n<li><strong><a href=\"https://www.techwalker.com/2026/0623/3191354.shtml\" target=\"_blank\" rel=\"noopener\">REVES：教 LLM 像高手棋手一样从错误中学习</a></strong>（西北大学/亚马逊/高通/明尼苏达大学, 6月23日报道）— 分解纠错训练让模型从单步错误中自主恢复，LiveCodeBench +6.5 分，小模型经训练后在复杂优化问题上匹敌大模型。<a href=\"https://www.techwalker.com/2026/0623/3191354.shtml\" target=\"_blank\" rel=\"noopener\">[TechWalker</a>]</li>\n</ul>\n<h3 id=\"国内\">国内</h3>\n\n<ul>\n<li><strong>今日暂无国内高校/企业的最新论文被搜索引擎收录。</strong></li>\n</ul>\n\n<h2 id=\"产品应用\">🚀 产品应用</h2>\n\n<h3 id=\"国际\">国际</h3>\n\n<ul>\n<li><strong>Getty Images 与 OpenAI 达成授权合作</strong>（6月23日）— Getty 海量图片库集成至 ChatGPT 搜索和发现功能，Getty 股价盘中飙升 145%。此前 Getty 曾起诉 Stability AI 侵权，此次合作标志着内容方与 AI 公司从对抗走向共赢。<a href=\"https://www.theedgesingapore.com/news/artificial-intelligence/getty-images-surges-145-after-announcing-openai-deal\" target=\"_blank\" rel=\"noopener\">[The Edge Singapore</a>]</li>\n<li><strong>五眼联盟发布 AI 网络安全紧急警告</strong>（6月23日）— 美英加澳新联合声明称高级 AI 模型可能在\"数月内\"具备瘫痪政府和企业网络的能力。此前数日，特朗普政府已下令 Anthropic 限制外国公民访问其最强模型。<a href=\"https://www.cnn.com/2026/06/23/us/5-things-to-know-for-june-23-ai-warning-primaries-nuclear-weapons-uk-political-turmoil-montreal-shooting\" target=\"_blank\" rel=\"noopener\">[CNN</a>]</li>\n<li><strong>联合国秘书长要求 AI 公司公开环境成本</strong>（6月23日）— Guterres 在伦敦气候行动周发起 AI 环境透明倡议，警告到 2030 年 AI 数据中心的用电量将超过全球前五名之外的所有国家，用水量足以覆盖整个撒哈拉以南非洲 13 亿人的基本需求。<a href=\"https://www.pakistantoday.com.pk/2026/06/23/un-chief-urges-ai-firms-to-disclose-environmental-costs\" target=\"_blank\" rel=\"noopener\">[Pakistan Today</a>]</li>\n<li><strong>Cohere CEO 警告：租用外国 AI 是国家安全风险</strong>（6月23日）— Aidan Gomez 以美国限制 Anthropic Mythos 模型为例，呼吁各国建设\"主权 AI\"。<a href=\"https://fortune.com/2026/06/23/cohere-ceo-sovereign-ai-anthropic-mythos-national-security-risk/\" target=\"_blank\" rel=\"noopener\">[Fortune</a>]</li>\n</ul>\n<h3 id=\"国内\">国内</h3>\n\n<ul>\n<li><strong>火山引擎 FORCE 大会：豆包 2.1 Pro 发布</strong>（6月23日）— Coding、Agent、VLM 三大能力跨越\"生产级质变点\"，多项评测超越 Claude Opus 4.6。芯片设计 RTL 测试连续运行近 18 小时、9 轮迭代、完成 1303 行代码。500+ Agent 同步协作生成 3D 虚拟城市。日均 Token 调用量突破 180 万亿（两年 1500 倍），MaaS 市场份额 49.5%，定价为 Claude 的约 1/5。<a href=\"https://m.163.com/dy/article/L04GF29D0511AQHO.html\" target=\"_blank\" rel=\"noopener\">[163</a>] <a href=\"http://www.bjnews.com.cn/detail/1782214513129479.html\" target=\"_blank\" rel= const navList = document.getElementById('navList');
const main = document.getElementById('main');
const toc = document.getElementById('toc');
const tocLinks = document.getElementById('tocLinks');
const imgPreview = document.getElementById('imgPreview');

// ── Nav ──
function renderNav() {
  const dates = Object.keys(BRIEFINGS).sort().reverse();
  navList.innerHTML = dates.map((d, i) => {
    const dt = new Date(d + 'T00:00:00');
    const mmdd = String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
    const days = ['周日','周一','周二','周三','周四','周五','周六'];
    return `<li><a href="#${d}" class="${i===0?'active':''}" onclick="showBriefing('${d}');return false">
      <span class="date-badge">${mmdd}</span>${days[dt.getDay()]}</a></li>`;
  }).join('');
}

// ── Build ToC ──
function buildToc() {
  const headings = main.querySelectorAll('h2[id], h3[id]');
  tocLinks.innerHTML = Array.from(headings).map(h => {
    const tag = h.tagName.toLowerCase();
    return `<a href="#${h.id}" style="padding-left:${tag==='h3'?'16px':'8px'}">${h.textContent}</a>`;
  }).join('');

  // Highlight on scroll
  const links = tocLinks.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const id = e.target.id;
      const link = tocLinks.querySelector(`a[href="#${id}"]`);
      if (e.isIntersecting && link) {
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px' });
  headings.forEach(h => observer.observe(h));
}

// ── Toggle sections ──
function initSections() {
  main.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', () => {
      const section = header.parentElement;
      const wasOpen = section.classList.contains('open');
      section.classList.toggle('open');
      // Scroll to section if opening
      if (!wasOpen && section.querySelector('h2')) {
        setTimeout(() => section.querySelector('h2').scrollIntoView({behavior:'smooth',block:'start'}), 100);
      }
    });
  });
  // Open first two sections by default
  const sections = main.querySelectorAll('.section');
  sections.forEach((s, i) => { if (i < 2) s.classList.add('open'); });
}

// ── Image hover preview ──
function initImagePreviews() {
  main.querySelectorAll('a[href]').forEach(a => {
    const url = a.getAttribute('href');
    if (!url || !url.startsWith('http')) return;
    // Check if this URL has an associated image
    const img = IMAGES[url];
    if (!img) return;
    a.addEventListener('mouseenter', () => {
      imgPreview.src = img;
      imgPreview.style.display = 'block';
    });
    a.addEventListener('mouseleave', () => {
      imgPreview.style.display = 'none';
    });
  });
}

// ── Render briefing ──
function wrapSections(html) {
  // Wrap h2 + following content into <div class="section">
  // Simple approach: split by <h2, wrap each
  let result = html;
  // Match h2 with optional id, followed by content until next h2 or end
  result = result.replace(/(<h2[^>]*>.*?<\/h2>)((?:(?!<h2[^>]*>)[\s\S])*?)(?=<h2[^>]*>|$)/gi, (match, h2, body) => {
    const isOpen = body.includes('id="') && (body.includes('科研学术') || body.includes('产品应用'));
    return `<div class="section"><div class="section-header">${h2}<span class="section-arrow">▶</span></div><div class="section-body">${body}</div></div>`;
  });
  return result;
}

function showBriefing(date) {
  navList.querySelectorAll('a').forEach(a => a.classList.remove('active'));
  const link = navList.querySelector(`a[href="#${date}"]`);
  if (link) link.classList.add('active');

  let html = BRIEFINGS[date];
  if (!html) {
    main.innerHTML = '<div style="text-align:center;padding:80px">未找到该日期日报</div>';
    return;
  }

  // Inject images into article links
  html = injectImages(html);

  // Wrap sections
  html = wrapSections(html);

  main.innerHTML = `<div class="briefing">${html}</div>`;

  initSections();
  initImagePreviews();
  buildToc();
  main.scrollTop = 0;
  window.scrollTo(0, 0);

  // Show ToC after a brief delay
  setTimeout(() => toc.classList.add('visible'), 400);
}

function injectImages(html) {
  // Find <li> items with <a> links and add thumbnail if image exists
  const div = document.createElement('div');
  div.innerHTML = html;

  div.querySelectorAll('li').forEach(li => {
    const a = li.querySelector('a[href]');
    if (!a) return;
    const url = a.getAttribute('href');
    const img = IMAGES[url];
    if (!img) return;

    // Check if this is a long-form article (has <strong>)
    const hasStrong = li.querySelector('strong');
    if (hasStrong) {
      // Wrap in card layout
      const content = li.innerHTML;
      li.innerHTML = `<div class="article-card">
        <img class="card-img" src="${img}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-body">${content}</div>
      </div>`;
      li.style.listStyle = 'none';
    }
  });

  return div.innerHTML;
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  renderNav();
  const dates = Object.keys(BRIEFINGS).sort().reverse();
  if (dates.length > 0) showBriefing(dates[0]);

  // Hide ToC when scrolling past the briefing
  let tocTimer;
  window.addEventListener('scroll', () => {
    clearTimeout(tocTimer);
    toc.classList.add('visible');
    tocTimer = setTimeout(() => {
      if (window.scrollY < 200) toc.classList.remove('visible');
    }, 3000);
  });
});

window.addEventListener('hashchange', () => {
  const date = window.location.hash.slice(1);
  if (date && BRIEFINGS[date]) showBriefing(date);
});
</script>
